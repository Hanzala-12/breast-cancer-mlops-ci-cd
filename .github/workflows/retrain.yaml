name: Automated Retraining Pipeline

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight
  workflow_dispatch: # Allows manual trigger

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Retrain Model and Log to MLFlow
        run: python src/train.py

      - name: Run Tests on new model
        run: pytest tests/

      - name: Deploy newly retrained model
        if: success()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub joblib
          echo "Deploying the auto-updated best model..."
          python -c "
          import os
          from huggingface_hub import HfApi
          api = HfApi()
          try:
              api.upload_file(
                  path_or_fileobj='models/best_model.pkl',
                  path_in_repo='best_model.pkl',
                  repo_id='hhui00/breast_cancer_M', 
                  token=os.environ.get('HF_TOKEN')
              )
              print('Successfully deployed retrained model to Hugging Face!')
          except Exception as e:
              print(f'Deployment failed: {e}')
          "
