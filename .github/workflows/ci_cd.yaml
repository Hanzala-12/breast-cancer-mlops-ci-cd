name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  train-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Training Script
        run: python src/train.py

      - name: Run Tests
        run: pytest tests/

  deploy:
    needs: train-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub joblib
          echo "Deploying the best model assuming tests passed."
          python -c "
          import os
          from huggingface_hub import HfApi
          api = HfApi()
          # Note: Assuming 'models/best_model.pkl' created in previous steps was stored/passed.
          # api.upload_file(
          #     path_or_fileobj='models/best_model.pkl',
          #     path_in_repo='best_model.pkl',
          #     repo_id='YourUsername/YourModelRepo',
          #     token=os.environ.get('HF_TOKEN')
          # )
          "