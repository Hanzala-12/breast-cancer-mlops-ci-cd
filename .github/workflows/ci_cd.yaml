name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  train-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Training Script
        run: python src/train.py

      - name: Run Tests
        run: pytest tests/

      - name: Upload Best Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: best_model
          path: models/best_model.pkl

  deploy:
    needs: train-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download Best Model Artifact
        uses: actions/download-artifact@v4
        with:
          name: best_model
          path: models

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub joblib
          echo "Deploying the best model assuming tests passed."
          python -c "
          import os
          from huggingface_hub import HfApi
          api = HfApi()
          try:
              api.upload_file(
                  path_or_fileobj='models/best_model.pkl',
                  path_in_repo='best_model.pkl',
                  repo_id='hhui00/breast_cancer_M', 
                  token=os.environ.get('HF_TOKEN')
              )
              print('Successfully deployed to Hugging Face!')
          except Exception as e:
              print(f'Deployment failed: {e}')
          "